<style>
/* ════════════════════════════════════════════════════════════
   织经 · Workflow Cookbook  —  Bright Editorial / Newspaper theme
   Palette adapted from the Neverless design system (bright variant)
   ════════════════════════════════════════════════════════════ */
:root{
  --paper:#FBFAF5; --paper-2:#F4F1E8; --card:#FFFFFF;
  --ink:#1C1C1E; --ink-soft:#3A3A3E; --ink-mute:#6B6B6E; --ink-faint:#6E685C;
  --accent:#F05C00;          /* bright orange: rules, progress, large glyphs */
  --accent-text:#AF3E0D;     /* darker orange: small text on paper/tint (WCAG AA, >=4.5:1) */
  --accent-press:#A33C00;
  --accent-tint:#FCEFE6;
  --rule:#1C1C1E; --line:#E4DFD2; --line-2:#EEEAE0;
  --code-bg:#FBF9F3; --code-head:#F3EFE4; --code-border:#E4DECF; --code-ink:#26262B;
  --f-display:'Playfair Display','Noto Serif SC',Georgia,serif;
  --f-body:'Newsreader','Noto Serif SC',Georgia,serif;
  --f-ui:'Inter','Noto Sans SC',system-ui,-apple-system,sans-serif;
  --f-mono:'JetBrains Mono','Cascadia Code',Consolas,monospace;
  --side-w:298px; --toc-w:208px; --measure:720px;
  --ease:cubic-bezier(.22,.61,.36,1); --t:200ms;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:17px;-webkit-text-size-adjust:100%;scroll-padding-top:64px}
body{font-family:var(--f-body);color:var(--ink);background:var(--paper);line-height:1.78;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:var(--accent-tint);color:var(--accent-press)}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
img{max-width:100%}

/* focus visibility (WCAG 2.4.7) */
:focus-visible{outline:2px solid var(--accent-press);outline-offset:2px;border-radius:4px}
:focus:not(:focus-visible){outline:none}
.lang-toggle :focus-visible,.np-item:focus-visible,.ch-cell:focus-visible{outline-color:var(--ink)}

/* visually hidden (skip link / live region) */
.vh{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.skip{position:fixed;top:8px;left:8px;z-index:300;background:var(--ink);color:var(--paper);padding:9px 16px;border-radius:8px;font-family:var(--f-ui);font-size:.82rem;font-weight:600;transform:translateY(-150%);transition:transform var(--t) var(--ease)}
.skip:focus{transform:translateY(0)}

#progress{position:fixed;top:0;left:0;height:2px;width:0;background:var(--accent);z-index:200;transition:width 80ms linear}

/* ════════ Sidebar ════════ */
.sidebar{position:fixed;top:0;left:0;width:var(--side-w);height:100vh;z-index:90;background:var(--paper-2);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.side-head{padding:26px 26px 18px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:baseline;gap:9px}
.brand .mark{font-family:var(--f-display);font-weight:900;font-size:1.62rem;letter-spacing:.01em;color:var(--ink)}
.brand .mark .dot{color:var(--accent)}
.brand .en{font-family:var(--f-ui);font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mute);font-weight:600}
.side-tag{margin-top:9px;font-family:var(--f-ui);font-size:.72rem;line-height:1.5;color:var(--ink-mute)}
.side-env{margin-top:10px;font-family:var(--f-mono);font-size:.6rem;line-height:1.5;color:var(--ink-faint);border-top:1px dashed var(--line);padding-top:9px;word-break:break-word}
.side-nav{flex:1;overflow-y:auto;padding:14px 0 40px;scrollbar-width:thin}
.side-nav::-webkit-scrollbar{width:7px}
.side-nav::-webkit-scrollbar-thumb{background:#d9d3c4;border-radius:4px}
.np-group{margin-bottom:6px}
.np-label{font-family:var(--f-ui);font-size:.63rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--accent-text);padding:14px 26px 6px}
.np-item{display:flex;gap:9px;align-items:baseline;padding:6px 26px 6px 24px;font-family:var(--f-ui);font-size:.82rem;color:var(--ink-soft);border-left:2.5px solid transparent;transition:all var(--t) var(--ease);line-height:1.42}
.np-item:hover{color:var(--accent-text);background:var(--accent-tint);transform:translateX(2px)}
.np-item.active{color:var(--accent-press);font-weight:600;border-left-color:var(--accent);background:var(--accent-tint)}
.np-num{font-family:var(--f-mono);font-size:.68rem;color:var(--ink-faint);min-width:20px;flex-shrink:0}
.np-item.active .np-num{color:var(--accent-press)}

/* ════════ Layout shell ════════ */
.shell{margin-left:var(--side-w);min-height:100vh;display:flex;justify-content:center}
.col{width:100%;max-width:calc(var(--measure) + var(--toc-w) + 96px);display:flex;gap:48px;padding:0 48px}
.main{flex:1;min-width:0;max-width:var(--measure);padding:64px 0 140px;margin:0 auto}
.topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0 13px;margin-bottom:30px;background:linear-gradient(var(--paper) 78%,rgba(251,250,245,0))}
.crumb{font-family:var(--f-ui);font-size:.72rem;letter-spacing:.04em;color:var(--ink-mute);text-transform:uppercase}
.crumb b{color:var(--ink);font-weight:600}
.tools{display:flex;align-items:center;gap:8px}
.lang-toggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--card)}
.lang-toggle button{font-family:var(--f-ui);font-size:.72rem;font-weight:600;padding:5px 13px;color:var(--ink-mute);transition:all var(--t) var(--ease)}
.lang-toggle button.on{background:var(--ink);color:var(--paper)}
.lang-toggle button:not(.on):hover{color:var(--accent-text);background:var(--paper-2)}
.ghbtn{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-ui);font-size:.72rem;font-weight:600;color:var(--ink-mute);border:1px solid var(--line);border-radius:999px;padding:5px 12px;transition:all var(--t) var(--ease)}
.ghbtn:hover{color:var(--accent-text);border-color:var(--accent)}
.menu-btn{display:none}

/* ════════ Article typography ════════ */
.main h1,.main h2,.main h3,.main h4{font-family:var(--f-display);color:var(--ink);line-height:1.18;letter-spacing:-.01em}
.main h1{font-size:2.85rem;font-weight:900;margin:.2em 0 .35em;letter-spacing:-.02em}
.main h2{font-size:1.92rem;font-weight:700;margin:2.1em 0 .6em;padding-bottom:.28em;border-bottom:1px solid var(--line)}
.main h3{font-size:1.4rem;font-weight:700;margin:1.7em 0 .5em}
.main h4{font-size:1.08rem;font-weight:600;font-family:var(--f-ui);margin:1.4em 0 .4em;letter-spacing:.01em}
.main h2 .anchor,.main h3 .anchor{opacity:0;margin-left:.4em;color:var(--accent-text);font-family:var(--f-ui);font-size:.7em;transition:opacity var(--t)}
.main h2:hover .anchor,.main h3:hover .anchor,.main .anchor:focus{opacity:.7}
.main p{margin:0 0 1.2em;font-size:1.06rem}
.main p code,.main li code,.main td code{font-family:var(--f-mono);font-size:.85em;background:#F1ECDF;color:#9A3D12;padding:.12em .4em;border-radius:4px;border:1px solid var(--code-border);white-space:normal;overflow-wrap:anywhere}
.main a.link{color:var(--accent-text);border-bottom:1px solid #f0bfa0;transition:border-color var(--t)}
.main a.link:hover{border-color:var(--accent)}
.main ul,.main ol{margin:0 0 1.3em;padding-left:1.5em}
.main li{margin:.34em 0;font-size:1.05rem}
.main li::marker{color:var(--accent-text)}
.main strong{font-weight:700;color:var(--ink)}
.main hr{border:0;height:1px;background:var(--line);margin:2.4em 0}
.main .lead{font-size:1.2rem;color:var(--ink-soft);line-height:1.7}
/* Drop-cap only on Latin-first text (en view); a giant single CJK glyph looks odd, so it is disabled for zh */
html[lang="en"] .main>p:first-of-type::first-letter,html[lang="en"] .main .dropcap::first-letter{font-family:var(--f-display);font-weight:900;float:left;font-size:3.5rem;line-height:.82;padding:.06em .12em 0 0;color:var(--accent)}
.main blockquote{margin:1.6em 0;padding:.2em 0 .2em 1.4em;border-left:3px solid var(--accent);font-style:italic;color:var(--ink-soft);font-size:1.08rem}
.main blockquote p:last-child{margin-bottom:0}
.main table{width:100%;border-collapse:collapse;margin:1.6em 0;font-family:var(--f-ui);font-size:.86rem}
.main thead th{text-align:left;font-weight:700;color:var(--ink);border-bottom:2px solid var(--rule);padding:.6em .7em}
.main tbody td{padding:.55em .7em;border-bottom:1px solid var(--line);color:var(--ink-soft);vertical-align:top}
.main tbody tr:hover{background:var(--paper-2)}
.main img{border:1px solid var(--line);border-radius:8px;margin:1.4em 0;background:var(--card)}
.main .table-wrap{overflow-x:auto;margin:1.6em 0;-webkit-overflow-scrolling:touch;border-radius:8px}
.main .table-wrap table{margin:0;min-width:480px}
.main .table-wrap::-webkit-scrollbar{height:9px}
.main .table-wrap::-webkit-scrollbar-thumb{background:#dcd5c4;border-radius:5px}

/* ════════ Code blocks (BRIGHT) ════════ */
.code-card{position:relative;margin:1.6em 0;border:1px solid var(--code-border);border-radius:10px;overflow:hidden;background:var(--code-bg);box-shadow:0 1px 2px rgba(28,28,30,.04)}
/* right-edge fade hints at horizontally-scrollable code; sits over the pre body, never the header/copy button, and ignores pointer events. Shown only when content overflows and not yet scrolled to the end (toggled in JS). */
.code-card::after{content:"";position:absolute;right:0;bottom:0;width:34px;height:calc(100% - 2.1rem);pointer-events:none;opacity:0;background:linear-gradient(to right,rgba(251,249,243,0),var(--code-bg) 78%);border-bottom-right-radius:10px;transition:opacity var(--t) var(--ease)}
.code-card.is-scrollable::after{opacity:1}
.code-head{display:flex;align-items:center;justify-content:space-between;padding:.42rem .55rem .42rem .85rem;background:var(--code-head);border-bottom:1px solid var(--code-border)}
.code-lang{font-family:var(--f-ui);font-size:.66rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mute);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.code-copy{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;font-family:var(--f-ui);font-size:.7rem;font-weight:600;color:var(--ink-mute);padding:3px 9px;border:1px solid var(--code-border);border-radius:6px;background:var(--card);transition:all var(--t) var(--ease)}
.code-copy:hover{color:var(--accent-text);border-color:var(--accent)}
.code-copy.done{color:#1a7f37;border-color:#1a7f37}
.code-copy.fail{color:#c0392b;border-color:#c0392b}
.code-copy svg{width:12px;height:12px}
.code-card pre{margin:0;padding:1rem 1.1rem;overflow-x:auto;background:transparent}
.code-card pre:focus-visible{outline-offset:-2px}
.code-card pre::-webkit-scrollbar{height:9px}
.code-card pre::-webkit-scrollbar-thumb{background:#dcd5c4;border-radius:5px}
.code-card code{font-family:var(--f-mono);font-size:.83rem;line-height:1.62;color:var(--code-ink);tab-size:2;-moz-tab-size:2;white-space:pre}
.code-card code .hljs-comment,.code-card code .hljs-quote{color:#6f6a5c;font-style:italic}
.code-card code .hljs-keyword,.code-card code .hljs-selector-tag,.code-card code .hljs-literal{color:#a8400e}
.code-card code .hljs-string,.code-card code .hljs-regexp,.code-card code .hljs-addition{color:#207227}
.code-card code .hljs-number,.code-card code .hljs-built_in,.code-card code .hljs-class .hljs-title{color:#8f4a00}
.code-card code .hljs-function .hljs-title,.code-card code .hljs-title.function_{color:#1a5a8a}
.code-card code .hljs-attr,.code-card code .hljs-attribute,.code-card code .hljs-property{color:#6b5000}
.code-card code .hljs-type,.code-card code .hljs-title.class_{color:#5e38a0}
.code-card code .hljs-meta,.code-card code .hljs-symbol{color:#6f6a5c}

.mermaid-fig{margin:1.8em 0;padding:1.4em 1em;border:1px solid var(--line);border-radius:10px;background:var(--card);text-align:center;overflow-x:auto}
.mermaid-fig svg{max-width:100%;height:auto}

.callout{margin:1.5em 0;padding:.95em 1.2em .95em 1.3em;border-radius:8px;border:1px solid var(--line);border-left:4px solid var(--ink-mute);background:#FFFCF5;font-family:var(--f-ui);font-size:.93rem;line-height:1.62;color:var(--ink-soft)}
.callout>:first-child{margin-top:0}.callout>:last-child{margin-bottom:0}
.callout.tip{border-left-color:#5E9B57;background:#F7FAF1}
.callout.warn{border-left-color:#C68A1B;background:#FCF6E6}
.callout.info{border-left-color:#B8430F;background:var(--accent-tint)}

/* ════════ Right TOC ════════ */
.toc{width:var(--toc-w);flex-shrink:0;padding:90px 0 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.toc-title{font-family:var(--f-ui);font-size:.64rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:12px}
.toc a{display:block;font-family:var(--f-ui);font-size:.76rem;line-height:1.4;color:var(--ink-mute);padding:5px 0 5px 12px;border-left:2px solid var(--line);transition:all var(--t) var(--ease)}
.toc a:hover{color:var(--accent-text)}
.toc a.active{color:var(--accent-press);border-left-color:var(--accent);font-weight:600}
.toc a.h3{padding-left:24px;font-size:.72rem}

.ch-nav{display:flex;gap:14px;margin-top:60px;padding-top:28px;border-top:2px solid var(--rule)}
.ch-nav a{flex:1;font-family:var(--f-ui);padding:14px 16px;border:1px solid var(--line);border-radius:10px;transition:all var(--t) var(--ease);background:var(--card)}
.ch-nav a:hover,.ch-nav a:focus-visible{border-color:var(--accent);transform:translateY(-2px)}
.ch-nav .dir{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute)}
.ch-nav .t{font-size:.95rem;font-weight:600;color:var(--ink);margin-top:3px}
.ch-nav .next{text-align:right}

/* ════════ Landing ════════ */
.front{padding:48px 0 120px}
.masthead{text-align:center;border-top:3px solid var(--rule);border-bottom:3px solid var(--rule);padding:8px 0 4px;margin-bottom:6px}
.masthead .kicker{font-family:var(--f-ui);font-size:.64rem;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-mute);padding:8px 0 4px}
.masthead h1{font-family:var(--f-display);font-weight:900;font-size:5rem;line-height:.94;letter-spacing:-.02em;margin:.02em 0 .04em}
.masthead h1 .dot{color:var(--accent)}
.masthead .sub{font-family:var(--f-display);font-style:italic;font-weight:500;font-size:1.4rem;color:var(--ink-soft);padding:0 0 12px}
.dateline{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;font-family:var(--f-ui);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);padding:10px 0;border-bottom:1px solid var(--line)}
.dateline .sep{color:var(--accent)}
.front-lead{font-family:var(--f-body);font-size:1.22rem;line-height:1.7;color:var(--ink-soft);text-align:center;max-width:600px;margin:30px auto 8px;font-style:italic}
.front-lead .em{color:var(--accent-text);font-style:normal;font-weight:600}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:40px 0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}
.stat{padding:22px 16px;text-align:center;border-right:1px solid var(--line)}
.stat:last-child{border-right:0}
.stat .n{font-family:var(--f-display);font-weight:900;font-size:2.2rem;color:var(--accent);line-height:1}
.stat .l{font-family:var(--f-ui);font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mute);margin-top:7px}
.sections{margin-top:54px}
.sec-rule{display:flex;align-items:center;gap:14px;margin:0 0 26px}
.sec-rule .ttl{font-family:var(--f-ui);font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
.sec-rule .ln{flex:1;height:1px;background:var(--rule)}
.part-block{margin-bottom:42px}
.part-block .ph{font-family:var(--f-display);font-size:1.5rem;font-weight:700;color:var(--ink);margin-bottom:4px}
.part-block .pd{font-family:var(--f-ui);font-size:.82rem;color:var(--ink-mute);margin-bottom:16px}
.ch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.ch-cell{background:var(--card);padding:15px 17px;display:flex;gap:12px;align-items:baseline;transition:background var(--t) var(--ease)}
.ch-cell:hover{background:var(--accent-tint)}
.ch-cell .cn{font-family:var(--f-mono);font-size:.78rem;color:var(--accent-text);font-weight:500;flex-shrink:0;min-width:24px}
.ch-cell .ct{font-family:var(--f-body);font-size:1rem;color:var(--ink);line-height:1.35}

.loading{display:flex;align-items:center;justify-content:center;min-height:50vh;color:var(--ink-mute);font-family:var(--f-ui);font-size:.85rem}
.spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin-right:10px;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.scrim{display:none;position:fixed;inset:0;background:rgba(28,28,30,.4);z-index:85}

@media(max-width:1180px){
  :root{--side-w:250px}
  .toc{display:none}
  .col{max-width:var(--measure);padding:0 40px}
  .side-head{padding:22px 20px 14px}
  .np-label{padding:14px 20px 6px}
  .np-item{padding-left:20px;padding-right:20px}
}
@media(max-width:920px){
  html{scroll-padding-top:80px}
  :root{--side-w:0px}
  .sidebar{transform:translateX(-100%);transition:transform .3s var(--ease),visibility .3s;width:300px;box-shadow:0 0 40px rgba(0,0,0,.18);visibility:hidden}
  body.nav-open .sidebar{transform:translateX(0);visibility:visible}
  body.nav-open .scrim{display:block}
  .shell{margin-left:0}
  .col{padding:0 22px}
  .main{padding:18px 0 100px}
  .topbar{background:var(--paper);margin-bottom:18px;padding-top:10px}
  .menu-btn{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid var(--line);border-radius:10px;background:var(--card)}
  .lang-toggle button{padding:9px 15px}
  .code-copy{padding:7px 11px}
  .np-item{padding-top:11px;padding-bottom:11px}
  .masthead h1{font-size:3rem}
  .masthead .sub{font-size:1.15rem}
  .front-lead{font-size:1.08rem}
  .main h1{font-size:2.1rem}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .stat:nth-child(2){border-right:0}
  .stat:nth-child(1),.stat:nth-child(2){border-bottom:1px solid var(--line)}
  .ch-grid{grid-template-columns:1fr}
}
@media(max-width:430px){
  .col{padding:0 16px}

<script>
/* ───────────────────────── State ───────────────────────── */
const S = { manifest:null, lang:'zh', id:null, flat:[] };
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
let routeSeq = 0, mmdSeq = 0, mermaidPromise = null, ticking = false, fadeTick = false;
let tocLinks = [], headEls = [];

const I18N = {
  zh:{ loading:'加载中…', onThisPage:'本页目录', prev:'上一章', next:'下一章', front:'封面', copy:'复制', copycode:'复制代码', copied:'已复制', copyfail:'复制失败', writing:'本章正在撰写中（文档文件尚未就绪）。', notfound:'未找到该章节。', loaderr:'内容索引加载失败，请刷新或检查 manifest.json。', rendererr:'Markdown 渲染组件加载失败，请刷新页面。' },
  en:{ loading:'Loading…', onThisPage:'On this page', prev:'Previous', next:'Next', front:'Cover', copy:'Copy', copycode:'Copy code', copied:'Copied', copyfail:'Copy failed', writing:'This chapter is being written (document not ready yet).', notfound:'Chapter not found.', loaderr:'Failed to load the content index. Refresh or check manifest.json.', rendererr:'Markdown renderer failed to load. Refresh the page.' }
};
const t = k => I18N[S.lang][k];
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const getSavedLang = () => { try{ return localStorage.getItem('wcb-lang'); }catch(e){ return null; } };
const saveLang = lang => { try{ localStorage.setItem('wcb-lang', lang); }catch(e){} };

/* slugify a heading -> anchor id (/u flag; CJK kept; dedup via `seen`) */
function slugify(text, seen){
  let id = String(text).trim().toLowerCase()
    .replace(/[\s_]+/gu,'-')
    .replace(/[^\p{L}\p{N}-]+/gu,'')
    .replace(/-{2,}/gu,'-').replace(/^-+|-+$/gu,'');
  if(!id) id = 'section';
  if(seen){
    if(seen[id]==null){ seen[id]=0; return id; }
    let n=seen[id], cand;
    do{ cand=id+'-'+(++n); }while(seen[cand]!=null);   // skip past any natural slug that already equals base-N
    seen[id]=n; seen[cand]=0; return cand;              // register the slug actually used, so later headings can't collide
  }
  return id;
}
function loadScript(src, integrity){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; if(integrity){ s.integrity=integrity; s.crossOrigin='anonymous'; } s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
async function ensureMermaid(){
  if(window.mermaid) return window.mermaid;
  if(!mermaidPromise){ mermaidPromise = loadScript('https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js', 'sha384-WmdflGW9aGfoBdHc4rRyWzYuAjEmDwMdGdiPNacbwfGKxBW/SO6guzuQ76qjnSlr').then(()=>{
    window.mermaid.initialize({ startOnLoad:false, theme:'base', securityLevel:'strict',
      themeVariables:{ primaryColor:'#FCEFE6', primaryBorderColor:'#F05C00', lineColor:'#6B6B6E', primaryTextColor:'#1C1C1E', fontFamily:'Inter, "Noto Sans SC", sans-serif', fontSize:'14px', secondaryColor:'#F4F1E8', tertiaryColor:'#FFFFFF' }});
    return window.mermaid;
  }); }
  return mermaidPromise;
}

/* ───────────────────────── Boot ───────────────────────── */
async function boot(){
  try{
    const res = await fetch('manifest.json');
    if(!res.ok) throw new Error(res.status);
    S.manifest = await res.json();
  }catch(e){
    const ui = (getSavedLang()==='en') ? I18N.en : I18N.zh;
    $('#content').innerHTML = '<div class="callout warn">'+ui.loaderr+'</div>';
    return;
  }
  S.flat = S.manifest.parts.flatMap(p=>p.chapters.map(c=>({...c, part:p})));
  const repo = S.manifest.site.repo; $('#ghLink').href = /^https?:\/\//i.test(repo) ? repo : '#';   // scheme allowlist: never assign a javascript:/data: URL to the visible link
  $('#sideEnv').textContent = S.manifest.site.env || '';
  const saved = getSavedLang();
  if(saved==='en'||saved==='zh') S.lang = saved;
  applyLangChrome(); buildNav(); bindEvents(); route();
}

function applyLangChrome(){
  document.documentElement.lang = S.lang==='zh'?'zh-CN':'en';
  $('#brandHome').href = '#/'+S.lang+'/home';
  $('#menuBtn').setAttribute('aria-label', S.lang==='zh'?'打开导航菜单':'Open navigation menu');
  $('#brandMark').innerHTML = S.lang==='zh' ? '织<span class="dot">·</span>经' : 'Loom<span class="dot">.</span>';
  $('#sideTag').textContent = S.manifest.site.tagline[S.lang];
  $$('#langToggle button').forEach(b=>{ const on=b.dataset.lang===S.lang; b.classList.toggle('on',on); b.setAttribute('aria-pressed', on?'true':'false'); });
}

function buildNav(){
  const nav = $('#sideNav'); nav.innerHTML='';
  S.manifest.parts.forEach(p=>{
    const g=document.createElement('div'); g.className='np-group';
    const lbl=document.createElement('div'); lbl.className='np-label'; lbl.textContent=p.label[S.lang]; g.appendChild(lbl);
    p.chapters.forEach(c=>{
      const a=document.createElement('a'); a.className='np-item'; a.href='#/'+S.lang+'/'+c.id; a.dataset.id=c.id;
      const num=document.createElement('span'); num.className='np-num'; num.textContent=c.num;
      const tt=document.createElement('span'); tt.textContent=c.title[S.lang];
      a.appendChild(num); a.appendChild(tt); g.appendChild(a);
    });
    nav.appendChild(g);
  });
}

function bindEvents(){
  $$('#langToggle button').forEach(b=> b.onclick = ()=>switchLang(b.dataset.lang));
  $('#menuBtn').onclick = ()=>toggleNav();
  $('#scrim').onclick = ()=>toggleNav(false);
  document.addEventListener('keydown', e=>{
    if(!document.body.classList.contains('nav-open')) return;
    if(e.key==='Escape'){ toggleNav(false); $('#menuBtn').focus(); }
    else if(e.key==='Tab'){
      const f=$$('#sidebar a, #sidebar button'); if(!f.length) return;
      const first=f[0], last=f[f.length-1];
      if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
    }
  });
  window.addEventListener('hashchange', route);
  window.addEventListener('scroll', ()=>{ if(!ticking){ ticking=true; requestAnimationFrame(onScroll); } }, {passive:true});
  window.addEventListener('resize', ()=>{ if(!ticking){ ticking=true; requestAnimationFrame(onScroll); } if(!fadeTick){ fadeTick=true; requestAnimationFrame(()=>{ fadeTick=false; refreshFades(); }); } }, {passive:true});
}

function toggleNav(force){
  const open = force===undefined ? !document.body.classList.contains('nav-open') : force;
  document.body.classList.toggle('nav-open', open);
  $('#menuBtn').setAttribute('aria-expanded', open?'true':'false');
  const shell=$('.shell'); if(shell){ if(open){ shell.setAttribute('inert',''); shell.setAttribute('aria-hidden','true'); } else { shell.removeAttribute('inert'); shell.removeAttribute('aria-hidden'); } }
  if(open){ const first=$('#sideNav .np-item'); if(first) first.focus(); }
}

function switchLang(lang){ if(lang!==S.lang){ saveLang(lang); location.hash='#/'+lang+'/'+(S.id||'home'); } }

/* ───────────────────────── Router ───────────────────────── */
function route(){
  if(!S.manifest) return;   // manifest failed to load — nothing to route
  const m = location.hash.match(/^#\/(zh|en)\/([^/]+)$/);
  let lang = S.lang, id = 'home';
  if(m){ lang=m[1]; id=m[2]; }
  if(lang!==S.lang){ S.lang=lang; applyLangChrome(); buildNav(); } // follow URL lang but DON'T persist — only explicit switchLang() saves, so a deep link can't clobber a saved preference
  S.id = id;
  const my = ++routeSeq;
  toggleNav(false);
  if(id==='home'){ renderHome(); } else { renderChapter(id, my); }
  $$('#sideNav .np-item').forEach(a=>{ const on=a.dataset.id===id; a.classList.toggle('active', on); if(on){ a.setAttribute('aria-current','true'); } else { a.removeAttribute('aria-current'); } });
  window.scrollTo(0,0);
}

/* focus the chapter <h1> on user-initiated routes, but NOT on the initial automatic paint (don't yank a screen reader on first load) */
let focusedH1Once = false;
function setH1Focus(h1){ if(!h1) return; h1.setAttribute('tabindex','-1'); if(focusedH1Once) h1.focus({preventScroll:true}); focusedH1Once = true; }

/* ───────────────────────── Home ───────────────────────── */
function renderHome(){
  $('#content').setAttribute('aria-busy','false');
  const st=S.manifest.site, parts=S.manifest.parts, isZh=S.lang==='zh';
  document.title = (isZh?'织经 · Workflow Cookbook':'Loom · The Workflow Cookbook');
  $('#crumb').innerHTML = isZh?'<b>封面</b>':'<b>Cover</b>';
  $('#toc').innerHTML=''; tocLinks=[]; headEls=[];
  const stats = isZh
    ? [['29','章 + 6 附录'],['20+','真实运行存证'],['v2.1.150','实测版本'],['ZH/EN','双语对照']]
    : [['29','Chapters +6 App.'],['20+','Real Run Logs'],['v2.1.150','Tested On'],['ZH/EN','Bilingual']];
  let html = '<div class="front">';
  html += '<div class="masthead"><div class="kicker">'+(isZh?'Claude Code · CLAUDE_CODE_WORKFLOWS 特性详解':'The CLAUDE_CODE_WORKFLOWS Feature, Decoded')+'</div>';
  html += '<h1>'+(isZh?'织<span class="dot">·</span>经':'Loom<span class="dot">.</span>')+'</h1>';
  html += '<div class="sub">'+esc(st.tagline[S.lang])+'</div></div>';
  html += '<div class="dateline"><span>'+(isZh?'确定性多 Agent 编排':'Deterministic Multi-Agent Orchestration')+'</span><span class="sep">◆</span><span>'+esc(st.env)+'</span></div>';
  html += '<p class="front-lead">'+(isZh
    ? '当所有人都在<span class="em">手动</span>指挥 Agent——这本书教你用 JavaScript 让它们<span class="em">自己编队</span>。每一个配方都在 Claude Code 中<span class="em">真实运行</span>，附真实输出。'
    : 'While everyone else <span class="em">hand-conducts</span> agents, this book teaches you to make them <span class="em">form up on their own</span> — in JavaScript. Every recipe is <span class="em">really run</span> in Claude Code, with real output.')+'</p>';
  html += '<div class="stat-row">'+stats.map(s=>'<div class="stat"><div class="n">'+s[0]+'</div><div class="l">'+s[1]+'</div></div>').join('')+'</div>';
  html += '<div class="sections"><div class="sec-rule"><span class="ttl">'+(isZh?'目录':'Contents')+'</span><span class="ln"></span></div>';
  parts.forEach(p=>{
    if(p.id==='preface') return;
    html += '<div class="part-block"><div class="ph">'+esc(p.label[S.lang])+'</div><div class="ch-grid">';
    p.chapters.forEach(c=>{ html += '<a class="ch-cell" href="#/'+S.lang+'/'+c.id+'"><span class="cn">'+c.num+'</span><span class="ct">'+esc(c.title[S.lang])+'</span></a>'; });
    html += '</div></div>';
  });
  html += '</div></div>';
  $('#content').innerHTML = html;
  const h1 = $('#content .masthead h1'); setH1Focus(h1);
}

/* ───────────────────────── Chapter ───────────────────────── */
async function renderChapter(id, my){
  const ch = S.flat.find(c=>c.id===id);
  const content = $('#content');
  if(!ch){
    content.setAttribute('aria-busy','false');
    document.title = '404 · '+(S.lang==='zh'?'织经':'Loom');
    $('#crumb').innerHTML = '<b>404</b>';
    $('#toc').innerHTML=''; tocLinks=[]; headEls=[];
    content.innerHTML='<h1>404</h1><p>'+t('notfound')+'</p>';
    const h1 = content.querySelector('h1'); setH1Focus(h1);
    return;
  }
  content.setAttribute('aria-busy','true');
  $('#live').textContent = t('loading');   // announce loading state to screen readers (the loaded chapter is then announced by h1 focus)
  content.innerHTML='<div class="loading"><span class="spin" aria-hidden="true"></span>'+t('loading')+'</div>';
  $('#crumb').innerHTML = esc(ch.part.label[S.lang])+' &nbsp;/&nbsp; <b>'+esc(ch.title[S.lang])+'</b>';
  document.title = ch.title[S.lang]+' · '+(S.lang==='zh'?'织经':'Loom');
  let md;
  try{
    const res = await fetch(ch.file[S.lang]);
    if(!res.ok) throw new Error(res.status);
    md = await res.text();
  }catch(e){
    if(my!==routeSeq) return;
    content.setAttribute('aria-busy','false');
    content.innerHTML = '<h1>'+esc(ch.title[S.lang])+'</h1><div class="callout warn">'+t('writing')+'</div>';
    $('#toc').innerHTML=''; tocLinks=[]; headEls=[]; renderChapNav(ch); return;
  }
  if(my!==routeSeq) return;   // stale fetch guard
  if(!window.marked || !window.DOMPurify){
    content.setAttribute('aria-busy','false');
    content.innerHTML = '<h1>'+esc(ch.title[S.lang])+'</h1><div class="callout warn">'+t('rendererr')+'</div>';
    $('#toc').innerHTML=''; tocLinks=[]; headEls=[]; renderChapNav(ch); return;
  }
  marked.setOptions({ gfm:true, breaks:false });
  const dirty = marked.parse(md);
  const clean = DOMPurify.sanitize(dirty, { ADD_ATTR:['target'] });
  content.innerHTML = '<article class="article">'+clean+'</article>';
  content.setAttribute('aria-busy','false');
  enhance();
  renderToc();
  renderChapNav(ch);
  const h1 = content.querySelector('h1'); setH1Focus(h1);
}

function renderChapNav(ch){
  const idx = S.flat.findIndex(c=>c.id===ch.id);
  const prev = S.flat[idx-1], next = S.flat[idx+1];
  const cell = (c,dir,cls)=> c
    ? '<a class="'+cls+'" href="#/'+S.lang+'/'+c.id+'"><div class="dir">'+dir+'</div><div class="t">'+esc(c.title[S.lang])+'</div></a>'
    : '<a class="'+cls+'" href="#/'+S.lang+'/home"><div class="dir">'+dir+'</div><div class="t">'+t('front')+'</div></a>';
  $('#content').insertAdjacentHTML('beforeend', '<nav class="ch-nav" aria-label="'+(S.lang==='zh'?'章节导航':'Chapter navigation')+'">'+cell(prev,t('prev'),'')+cell(next,t('next'),'next')+'</nav>');
}

function enhance(){
  const root = $('#content');
  $$('a', root).forEach(a=>{
    const href=a.getAttribute('href')||'';
    a.classList.add('link');
    if(/^https?:/i.test(href)){ a.target='_blank'; a.rel='noopener noreferrer'; }
    else if(href.length>1 && href[0]==='#' && href[1]!=='/'){
      // in-content section anchor: intercept so the hash router doesn't fall back to home,
      // and tolerantly resolve slug drift (e.g. uncollapsed double hyphens) via slugify()
      a.addEventListener('click', e=>{
        e.preventDefault();
        let raw; try{ raw = decodeURIComponent(href.slice(1)); }catch(_){ raw = href.slice(1); }   // tolerate malformed %-escapes instead of throwing a dead link
        const el = document.getElementById(raw) || document.getElementById(slugify(raw));
        if(el) jumpTo(el.id);
      });
    }
    // any author-supplied target=_blank (incl. protocol-relative //host) gets reverse-tabnabbing protection
    if(a.target==='_blank' && !/\bnoopener\b/.test(a.rel||'')){ a.rel=(a.rel?a.rel+' ':'')+'noopener noreferrer'; }
  });
  const seen=Object.create(null);
  $$('h2, h3', root).forEach(h=>{
    h.dataset.title = h.textContent.trim();
    h.id = slugify(h.dataset.title, seen);
    const a=document.createElement('a'); a.className='anchor'; a.href='#'+h.id; a.textContent='#';
    a.setAttribute('aria-label', (S.lang==='zh'?'本节链接：':'Link to section: ')+h.dataset.title);
    a.onclick=(e)=>{ e.preventDefault(); jumpTo(h.id); };
    h.appendChild(a);
  });
  // wrap wide tables so they scroll inside the column instead of breaking the page
  $$('table', root).forEach(tb=>{
    if(tb.parentElement && tb.parentElement.classList.contains('table-wrap')) return;
    const w=document.createElement('div'); w.className='table-wrap'; w.setAttribute('role','region'); w.setAttribute('tabindex','0'); w.setAttribute('aria-label', S.lang==='zh'?'表格（可横向滚动）':'Table (scroll horizontally)');
    tb.parentNode.insertBefore(w, tb); w.appendChild(tb);
  });
  // mermaid (lazy-loaded only when present)
  const mblocks = $$('pre code.language-mermaid', root);
  if(mblocks.length){
    ensureMermaid().then(mm=>{
      mblocks.forEach(code=>{
        const pre = code.parentElement;
        if(!pre || !pre.parentNode) return;   // chapter switched mid-load: node detached
        const fig = document.createElement('figure'); fig.className='mermaid-fig'; fig.setAttribute('role','img'); fig.setAttribute('aria-label', S.lang==='zh'?'流程图示（含义见正文描述）':'Diagram (see the surrounding text for its meaning)');
        const src = code.textContent;
        pre.parentNode.replaceChild(fig, pre);
        mm.render('mmd-'+(mmdSeq++), src).then(({svg})=>{
          fig.innerHTML = svg;
          // give each diagram a SPECIFIC accessible name from its own rendered labels, not a generic
          // placeholder. Flowcharts render labels into <foreignObject> (htmlLabels); sequence/state
          // diagrams use SVG <text> — collect both, one clean label per element.
          try{
            const seen2=new Set(), labels=[];
            fig.querySelectorAll('foreignObject, text').forEach(el=>{ const s=el.textContent.replace(/\s+/g,' ').trim(); if(s && !seen2.has(s)){ seen2.add(s); labels.push(s); } });
            if(labels.length){
              const list=labels.slice(0,24).join(S.lang==='zh'?'、':', ')+(labels.length>24?'…':'');
              fig.setAttribute('aria-label', S.lang==='zh' ? '图示，含：'+list+'。关系见正文。' : 'Diagram, containing: '+list+'. See the surrounding text for relationships.');
            }
          }catch(e){}
        }).catch(()=>{ fig.innerHTML = '<pre style="white-space:pre-wrap">'+esc(src)+'</pre>'; });
      });
    }).catch(()=>{});
  }
  // code cards
  $$('pre code', root).forEach(code=>{
    if(code.dataset.hl) return;
    let lang = (code.className.match(/language-([\w+#-]+)/)||[])[1] || 'text';   // keep + and # so c++/c#/f# label and highlight correctly
    if(lang==='mermaid') return;
    code.dataset.hl='1';
    try{ if(window.hljs && hljs.getLanguage(lang)){ code.innerHTML = hljs.highlight(code.textContent,{language:lang,ignoreIllegals:true}).value; } }catch(e){}
    const pre = code.parentElement;
    pre.setAttribute('tabindex','0'); pre.setAttribute('aria-label', lang+(S.lang==='zh'?' 代码（可横向滚动）':' code (scroll horizontally)'));
    const card=document.createElement('div'); card.className='code-card';
    const head=document.createElement('div'); head.className='code-head';
    const ls=document.createElement('span'); ls.className='code-lang'; ls.textContent=lang; ls.title=lang; head.appendChild(ls);
    const btn=document.createElement('button'); btn.className='code-copy'; btn.setAttribute('aria-label',t('copycode'));
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>'+t('copy')+'</span>';
    btn.onclick=()=>doCopy(code.textContent, btn);  // copy RAW text; tabs preserved (display tab-size is CSS-only)
    head.appendChild(btn);
    pre.parentNode.insertBefore(card, pre);
    card.appendChild(head); card.appendChild(pre);
    // right-edge fade: only when the code overflows horizontally and not scrolled to the end
    const updateFade=()=>{ const more = pre.scrollWidth - pre.clientWidth - pre.scrollLeft > 2; card.classList.toggle('is-scrollable', more); };
    pre.addEventListener('scroll', updateFade, {passive:true});
    requestAnimationFrame(updateFade);
  });
}

function refreshFades(){ $$('#content .code-card pre').forEach(pre=>{ const card=pre.closest('.code-card'); if(card) card.classList.toggle('is-scrollable', pre.scrollWidth-pre.clientWidth-pre.scrollLeft>2); }); }

function doCopy(text, btn){
  const flash=(cls,key)=>{ clearTimeout(btn._copyTimer); btn.classList.remove('done','fail'); btn.classList.add(cls); const ic=btn.querySelector('svg'); if(!btn._copyIcon) btn._copyIcon=ic.innerHTML;
    ic.innerHTML = cls==='done' ? '<polyline points="20 6 9 17 4 12"/>' : '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    btn.querySelector('span').textContent=t(key); btn.setAttribute('aria-label', t(key)); $('#live').textContent=t(key);
    btn._copyTimer = setTimeout(()=>{ btn.classList.remove(cls); ic.innerHTML=btn._copyIcon; btn.querySelector('span').textContent=t('copy'); btn.setAttribute('aria-label', t('copycode')); $('#live').textContent=''; },1600); };
  const done=()=>flash('done','copied');
  const fail=()=>flash('fail','copyfail');   // visible feedback when copy is blocked (e.g. file:// / no permission)
  const fallback=()=>{ const ta=document.createElement('textarea'); const prevFocus=document.activeElement; try{ ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); const ok=document.execCommand('copy'); ok?done():fail(); }catch(e){ fail(); } finally{ if(ta.parentNode) ta.parentNode.removeChild(ta); if(prevFocus && prevFocus.focus) prevFocus.focus(); } };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(fallback); } else { fallback(); }
}

function jumpTo(id){
  const el=document.getElementById(id); if(!el) return;
  const rm = matchMedia('(prefers-reduced-motion:reduce)').matches;
  el.scrollIntoView({behavior: rm?'auto':'smooth'});
  el.setAttribute('tabindex','-1'); el.focus({preventScroll:true});
}

function renderToc(){
  headEls = $$('#content h2, #content h3');
  const toc = $('#toc');
  if(headEls.length<2){ toc.innerHTML=''; tocLinks=[]; headEls=[]; return; }
  toc.innerHTML = '<div class="toc-title">'+t('onThisPage')+'</div>' +
    headEls.map(hd=>'<a href="#'+hd.id+'" class="'+(hd.tagName==='H3'?'h3':'')+'" data-id="'+hd.id+'">'+esc(hd.dataset.title||hd.textContent.trim())+'</a>').join('');
  tocLinks = $$('#toc a');
  tocLinks.forEach(a=>a.onclick=(e)=>{ e.preventDefault(); jumpTo(a.dataset.id); });
}

function onScroll(){
  ticking=false;
  const doc=document.documentElement;
  const sc=doc.scrollTop||document.body.scrollTop;
  const h=doc.scrollHeight-doc.clientHeight;
  $('#progress').style.width = (h>0?(sc/h*100):0)+'%';
  if(!tocLinks.length) return;
  let cur=null;
  for(const hd of headEls){ if(hd.getBoundingClientRect().top<140) cur=hd.id; }
  if(headEls.length && (h-sc)<20){ cur=headEls[headEls.length-1].id; }   // at page bottom: keep last heading active
  tocLinks.forEach(a=>{ const on=a.dataset.id===cur; a.classList.toggle('active', on); if(on){ a.setAttribute('aria-current','true'); } else { a.removeAttribute('aria-current'); } });
}

window.addEventListener('DOMContentLoaded', boot);
</script>
