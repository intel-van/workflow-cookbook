<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>织经 · Workflow Cookbook — Claude Code 多 Agent 编排实战手册</title>
<meta name="description" content="The Orchestration Weave — A Hands-on Guide to Multi-Agent Workflows in Claude Code">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ═══ Design Tokens ═══ */
:root{
  --bg:#FAF8F2;
  --bg-sidebar:#F3F0E8;
  --bg-code:#1e1e2e;
  --bg-card:#FFFFFF;
  --bg-pullquote:#FDF6E9;
  --text:#1A1A2E;
  --text-secondary:#5A5A72;
  --text-muted:#6E6E82;
  --accent:#C8952E;
  --accent-light:#FDF6E9;
  --accent-hover:#A87A24;
  --accent-dark:#8B6720;
  --border:#E8E4D8;
  --border-light:#F0ECE2;
  --rule:#C8952E;
  --sidebar-w:300px;
  --font-serif:'Playfair Display','Noto Serif SC',Georgia,serif;
  --font-serif-cn:'Noto Serif SC',Georgia,serif;
  --font-sans:'Inter','Noto Sans SC',system-ui,sans-serif;
  --font-sans-cn:'Noto Sans SC','Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
  --shadow:0 2px 8px rgba(26,26,46,0.06);
  --shadow-lg:0 8px 32px rgba(26,26,46,0.1);
  --radius:6px;
  --transition:.25s ease;
}

[data-theme="dark"]{
  --bg:#161618;
  --bg-sidebar:#1C1C20;
  --bg-code:#0d0d12;
  --bg-card:#1E1E24;
  --bg-pullquote:#2A2518;
  --text:#D4D4DA;
  --text-secondary:#9494A4;
  --text-muted:#666678;
  --accent:#D4A54A;
  --accent-light:#2A2518;
  --accent-hover:#E0B860;
  --accent-dark:#D4A54A;
  --border:#2A2A32;
  --border-light:#232328;
  --rule:#D4A54A;
  --shadow:0 2px 8px rgba(0,0,0,0.2);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.3);
}

html{font-size:16px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased}

body{
  font-family:var(--font-sans);color:var(--text);background:var(--bg);
  line-height:1.7;display:flex;min-height:100vh;
}

a{color:var(--accent);text-decoration:none;transition:color var(--transition)}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;text-align:inherit}
a:hover{color:var(--accent-hover)}

::selection{background:var(--accent-light);color:var(--accent-dark)}

/* ═══ Sidebar ═══ */
.sidebar{
  width:var(--sidebar-w);min-height:100vh;position:fixed;top:0;left:0;z-index:100;
  background:var(--bg-sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  transition:transform var(--transition);
}

.sidebar-header{
  padding:28px 24px 20px;border-bottom:1px solid var(--border);
}

.sidebar-brand{
  font-family:var(--font-serif);font-size:1.4rem;font-weight:700;
  color:var(--text);letter-spacing:-.02em;cursor:pointer;
  display:flex;align-items:baseline;gap:8px;
}

.sidebar-brand .dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  display:inline-block;flex-shrink:0;
}

.sidebar-subtitle{
  font-size:.72rem;color:var(--text-muted);margin-top:4px;
  font-family:var(--font-sans);letter-spacing:.04em;text-transform:uppercase;
  font-weight:500;
}

.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}

.nav-group{margin-bottom:8px}

.nav-group-title{
  font-size:.68rem;font-weight:600;color:var(--accent);
  text-transform:uppercase;letter-spacing:.08em;
  padding:8px 24px 4px;font-family:var(--font-mono);
}

.nav-item{
  display:block;padding:7px 24px 7px 28px;font-size:.82rem;color:var(--text-secondary);
  cursor:pointer;transition:all var(--transition);border-left:3px solid transparent;
  line-height:1.5;
}
.nav-item:hover{color:var(--accent);background:var(--accent-light)}
.nav-item.active{
  color:var(--accent);font-weight:500;
  border-left-color:var(--accent);background:var(--accent-light);
}
.nav-item .ch-num{
  font-family:var(--font-mono);font-size:.7rem;
  color:var(--text-muted);margin-right:6px;display:inline-block;min-width:22px;
}
.nav-item.draft{opacity:.45;pointer-events:none}

.sidebar-footer{
  padding:14px 24px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
}

.btn-icon{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg-card);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.9rem;transition:all var(--transition);color:var(--text-secondary);
}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}

.lang-toggle{font-size:.7rem;font-weight:600;font-family:var(--font-mono)}

.gh-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.75rem;font-weight:500;color:var(--text-secondary);
  text-decoration:none;padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--bg-card);
  transition:all var(--transition);
}
.gh-link svg{width:14px;height:14px;fill:currentColor}
.gh-link:hover{border-color:var(--accent);color:var(--accent)}

/* ═══ Mobile menu ═══ */
.menu-toggle{
  display:none;position:fixed;top:16px;left:16px;z-index:200;
  width:40px;height:40px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg-card);cursor:pointer;align-items:center;justify-content:center;
  box-shadow:var(--shadow);font-size:1.1rem;color:var(--text);
}

/* ═══ Main Content ═══ */
.main{
  margin-left:var(--sidebar-w);flex:1;min-width:0;
  display:flex;flex-direction:column;
}

.content-wrapper{
  max-width:820px;width:100%;margin:0 auto;
  padding:48px 40px 120px;
}

/* ═══ Landing Page ═══ */
.landing{text-align:center;padding:60px 0 40px}

.landing-badge{
  display:inline-block;font-size:.68rem;font-weight:600;
  padding:4px 16px;border-radius:20px;
  background:var(--accent-light);color:var(--accent);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:24px;
  font-family:var(--font-mono);
}

.landing h1{
  font-family:var(--font-serif);font-size:2.8rem;font-weight:900;
  line-height:1.15;letter-spacing:-.03em;margin-bottom:8px;
  color:var(--text);
}

.landing h1 em{
  font-style:italic;color:var(--accent);
}

.landing .subtitle{
  font-size:1.05rem;color:var(--text-secondary);font-weight:300;
  margin-bottom:12px;font-family:var(--font-sans);
}

.landing-rule{
  width:60px;height:3px;background:var(--accent);
  margin:24px auto;border-radius:2px;
}

.landing-epigraph{
  max-width:560px;margin:0 auto 40px;
  font-family:var(--font-serif-cn);font-size:.92rem;
  color:var(--text-secondary);line-height:1.9;
  font-style:italic;
}

.landing-epigraph .source{
  display:block;margin-top:8px;font-size:.8rem;
  color:var(--text-muted);font-style:normal;
  font-family:var(--font-sans);
}

.landing-hook{
  max-width:520px;margin:0 auto 48px;
  font-size:1rem;color:var(--text);line-height:1.8;
  font-weight:500;
}

.landing-hook strong{
  color:var(--accent);font-weight:700;
}

/* ═══ Chapter Grid ═══ */
.part-section{margin-bottom:40px}

.part-label{
  font-size:.7rem;font-weight:600;color:var(--accent);
  text-transform:uppercase;letter-spacing:.08em;
  font-family:var(--font-mono);margin-bottom:12px;
  padding-bottom:8px;border-bottom:2px solid var(--accent);
  display:inline-block;
}

.chapter-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:12px;
}

.chapter-card{
  padding:16px 18px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg-card);
  cursor:pointer;transition:all var(--transition);
  text-decoration:none;color:inherit;
}
.chapter-card:hover{
  border-color:var(--accent);box-shadow:var(--shadow);
  transform:translateY(-2px);
}
.chapter-card .num{
  font-family:var(--font-mono);font-size:.68rem;color:var(--accent);font-weight:500;
}
.chapter-card .title{
  font-size:.85rem;font-weight:500;margin-top:4px;line-height:1.4;
  font-family:var(--font-serif-cn);
}
.chapter-card .desc{
  font-size:.72rem;color:var(--text-muted);margin-top:6px;line-height:1.5;
}
.chapter-card.draft{opacity:.55;pointer-events:none;position:relative}
.chapter-card.draft::after{
  content:'SOON';position:absolute;top:8px;right:10px;
  font-size:.58rem;font-weight:700;font-family:var(--font-mono);
  color:var(--text-muted);background:var(--border-light);
  padding:1px 8px;border-radius:10px;letter-spacing:.06em;
}

/* ═══ Article Styles (Newspaper Editorial) ═══ */
.article{display:none}
.article.visible{display:block}

.article-header{
  margin-bottom:40px;padding-bottom:24px;
  border-bottom:2px solid var(--accent);
}

.article-header .part-label{
  font-size:.7rem;font-weight:600;color:var(--accent);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;
  font-family:var(--font-mono);border-bottom:none;display:block;
  padding-bottom:0;
}

.article-header h1{
  font-family:var(--font-serif-cn);font-size:2rem;font-weight:700;
  line-height:1.3;letter-spacing:-.02em;
}

.article-header .deck{
  margin-top:10px;font-size:1rem;color:var(--text-secondary);
  line-height:1.6;font-weight:300;
}

/* Drop cap */
.article-body .first-para::first-letter{
  font-family:var(--font-serif);font-size:3.4em;font-weight:900;
  float:left;line-height:.8;margin:4px 10px 0 0;
  color:var(--accent);
}

.article-body h2{
  font-family:var(--font-serif-cn);font-size:1.4rem;font-weight:700;
  margin:48px 0 16px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
  letter-spacing:-.01em;
}

.article-body h3{
  font-family:var(--font-serif-cn);font-size:1.1rem;font-weight:600;
  margin:32px 0 12px;color:var(--text);
}

.article-body p{
  margin-bottom:16px;line-height:1.8;
}

.article-body ul,.article-body ol{
  margin-bottom:16px;padding-left:24px;
}

.article-body li{
  margin-bottom:6px;line-height:1.7;
}

/* Pull quote — newspaper style */
.pullquote{
  margin:32px 0;padding:24px 28px;
  border-left:4px solid var(--accent);
  background:var(--bg-pullquote);
  border-radius:0 var(--radius) var(--radius) 0;
  font-family:var(--font-serif-cn);font-size:1.05rem;
  line-height:1.7;color:var(--text);font-style:italic;
}

.pullquote .attribution{
  display:block;margin-top:8px;font-size:.8rem;
  color:var(--text-muted);font-style:normal;
  font-family:var(--font-sans);
}

/* Code blocks — bright editorial exhibit style */
.article-body pre{
  margin:24px 0;border-radius:var(--radius);
  overflow-x:auto;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:4px solid var(--accent);
  position:relative;
}

.article-body pre::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;background:linear-gradient(90deg,var(--accent),transparent);
  border-radius:var(--radius) var(--radius) 0 0;
  opacity:.4;
}

.article-body pre code{
  display:block;padding:20px 24px;font-size:.82rem;
  line-height:1.7;color:var(--text);font-family:var(--font-mono);
  background:transparent;
}

.article-body code{
  font-family:var(--font-mono);font-size:.85em;
  background:var(--accent-light);color:var(--accent-dark);
  padding:2px 6px;border-radius:3px;
}

.article-body pre code{
  background:transparent;color:inherit;padding:0;
}

/* Dark theme code blocks get slightly darker card */
[data-theme="dark"] .article-body pre{
  background:#1a1a22;border-color:#2a2a35;
}
[data-theme="dark"] .article-body pre code{color:#d4d4da}

/* Tables */
.article-body table{
  width:100%;margin:20px 0;border-collapse:collapse;
  font-size:.85rem;
}

.article-body th{
  text-align:left;padding:10px 14px;
  border-bottom:2px solid var(--accent);
  font-weight:600;font-size:.78rem;
  text-transform:uppercase;letter-spacing:.04em;
  color:var(--accent);font-family:var(--font-mono);
}

.article-body td{
  padding:10px 14px;border-bottom:1px solid var(--border-light);
  line-height:1.5;
}

.article-body tr:hover td{background:var(--accent-light)}

/* Info/Tip boxes */
.callout{
  margin:24px 0;padding:16px 20px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg-card);
  font-size:.88rem;
}

.callout.tip{border-left:4px solid #3D7C6B}
.callout.warning{border-left:4px solid #D4784A}
.callout.info{border-left:4px solid var(--accent)}

.callout-title{
  font-weight:600;font-size:.78rem;text-transform:uppercase;
  letter-spacing:.04em;margin-bottom:6px;
  font-family:var(--font-mono);
}

.callout.tip .callout-title{color:#3D7C6B}
.callout.warning .callout-title{color:#D4784A}
.callout.info .callout-title{color:var(--accent)}

/* Navigation between chapters */
.article-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:64px;padding-top:24px;border-top:2px solid var(--border);
}

.article-nav a{
  display:flex;align-items:center;gap:8px;
  font-size:.85rem;color:var(--text-secondary);
  padding:8px 16px;border-radius:var(--radius);
  border:1px solid var(--border);transition:all var(--transition);
}
.article-nav a:hover{
  border-color:var(--accent);color:var(--accent);
  background:var(--accent-light);
}

/* ═══ Comparison table (ecosystem) ═══ */
.comparison-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:24px 0;
}

.comparison-card{
  padding:20px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg-card);
}

.comparison-card h4{
  font-size:.9rem;font-weight:600;margin-bottom:8px;
  font-family:var(--font-serif-cn);
}

.comparison-card .philosophy{
  font-size:.78rem;color:var(--accent);font-style:italic;
  margin-bottom:8px;font-family:var(--font-serif);
}

.comparison-card ul{
  font-size:.8rem;padding-left:16px;color:var(--text-secondary);
}

/* ═══ Test Result Card ═══ */
.test-result{
  margin:20px 0;padding:20px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg-card);
}

.test-result .test-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}

.test-result .status{
  display:inline-block;padding:2px 10px;border-radius:12px;
  font-size:.72rem;font-weight:600;text-transform:uppercase;
  font-family:var(--font-mono);
}

.test-result .status.pass{background:#E8F5E9;color:#2E7D32}
.test-result .status.fail{background:#FFEBEE;color:#C62828}

.test-result .test-name{
  font-weight:600;font-size:.9rem;
}

.test-result .test-output{
  background:var(--bg-card);border-radius:var(--radius);
  border:1px solid var(--border);border-left:4px solid var(--accent);
  padding:14px 18px;font-family:var(--font-mono);
  font-size:.78rem;color:var(--text);overflow-x:auto;
  line-height:1.6;
}
[data-theme="dark"] .test-result .test-output{background:#1a1a22}

/* ═══ Responsive ═══ */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:flex}
  .main{margin-left:0}
  .content-wrapper{padding:48px 20px 80px}
  .landing h1{font-size:2rem}
  .chapter-grid{grid-template-columns:1fr}
  .comparison-grid{grid-template-columns:1fr}
  .article-header h1{font-size:1.5rem}
}

@media(max-width:480px){
  .content-wrapper{padding:40px 16px 60px}
  .landing h1{font-size:1.6rem}
}

/* ═══ Newspaper decorative elements ═══ */
.newspaper-rule{
  border:none;height:1px;background:var(--border);
  margin:32px 0;
}

.newspaper-rule.thick{
  height:3px;background:var(--accent);
}

.newspaper-rule.double{
  height:4px;
  border-top:2px solid var(--text);
  border-bottom:1px solid var(--text);
  background:transparent;
}

.dateline{
  font-size:.72rem;font-family:var(--font-mono);
  color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.06em;
}

/* Print-friendly */
@media print{
  .sidebar,.menu-toggle,.sidebar-footer,.article-nav{display:none!important}
  .main{margin-left:0}
  .content-wrapper{max-width:100%;padding:20px}
}
</style>
</head>
<body>

<!-- Mobile menu toggle -->
<button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>

<!-- ═══ Sidebar ═══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="sidebar-brand" onclick="showLanding()" type="button">
      <span class="dot"></span>
      <span data-i18n="brand">织经</span>
    </button>
    <div class="sidebar-subtitle" data-i18n="brandSub">Workflow Cookbook</div>
  </div>

  <nav class="sidebar-nav" id="sidebarNav">
    <!-- Generated by JS -->
  </nav>

  <div class="sidebar-footer">
    <button class="btn-icon theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9790;</button>
    <button class="btn-icon lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
    <a class="gh-link" href="https://github.com/8bit-echo/workflow-cookbook" target="_blank">
      <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
  </div>
</aside>

<!-- ═══ Main ═══ -->
<main class="main">
  <div class="content-wrapper">

    <!-- Landing Page -->
    <div class="landing" id="landing">
      <div class="landing-badge" data-i18n="badge">Workflow Cookbook</div>

      <h1 data-i18n="title">织经</h1>
      <p class="subtitle" data-i18n="subtitle">Claude Code 多 Agent 编排实战手册</p>

      <div class="landing-rule"></div>

      <div class="landing-epigraph">
        <span data-i18n="epigraph">"经之以天，纬之以地。"</span>
        <span class="source" data-i18n="epigraphSource">——《左传》</span>
      </div>

      <div class="landing-hook" data-i18n="hook">
        当所有人都在手动指挥 Agent——<strong>这本书教你让它们自己编队。</strong>
      </div>

      <hr class="newspaper-rule double">

      <div id="chapterGrid">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Article Container -->
    <div class="article" id="articleView">
      <div class="article-header">
        <div class="part-label" id="articlePart"></div>
        <h1 id="articleTitle"></h1>
        <p class="deck" id="articleDeck"></p>
      </div>
      <div class="article-body" id="articleBody"></div>
      <div class="article-nav">
        <a href="#" id="prevChapter" onclick="return navChapter(-1)">
          <span>&larr;</span> <span data-i18n="prev">上一章</span>
        </a>
        <a href="#" id="nextChapter" onclick="return navChapter(1)">
          <span data-i18n="next">下一章</span> <span>&rarr;</span>
        </a>
      </div>
    </div>

  </div>

// ═══ State (CONTENT is loaded from chapters.js) ═══
let currentLang = 'zh';
let currentChapter = null;

// ═══ Functions ═══
function t(key) {
  const keys = key.split('.');
  let val = I18N[currentLang];
  for (const k of keys) { val = val?.[k]; }
  return val || key;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (val) el.innerHTML = val;
  });
  document.getElementById('langBtn').textContent = currentLang === 'zh' ? 'EN' : '中文';
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  applyI18n();
  buildNav();
  buildChapterGrid();
  if (currentChapter) showChapter(currentChapter);
  localStorage.setItem('wc-lang', currentLang);
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem('wc-theme', isDark ? 'light' : 'dark');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function buildNav() {
  const nav = document.getElementById('sidebarNav');
  const parts = ['p1','p2','p3','p4','p5','appendix'];
  let html = '';
  for (const p of parts) {
    const chs = CHAPTERS.filter(c => c.part === p);
    if (!chs.length) continue;
    html += '<div class="nav-group">';
    html += '<div class="nav-group-title">' + t('parts.' + p) + '</div>';
    for (const ch of chs) {
      const d = ch[currentLang];
      const active = currentChapter === ch.id ? ' active' : '';
      const navDraft = !CONTENT[ch.id] ? ' draft' : '';
      html += '<button class="nav-item' + active + navDraft + '" onclick="showChapter(\'' + ch.id + '\')" type="button">';
      html += '<span class="ch-num">' + ch.num + '</span>' + d.title;
      html += '</button>';
    }
    html += '</div>';
  }
  nav.innerHTML = html;
}

function buildChapterGrid() {
  const grid = document.getElementById('chapterGrid');
  const parts = ['p1','p2','p3','p4','p5','appendix'];
  let html = '';
  for (const p of parts) {
    const chs = CHAPTERS.filter(c => c.part === p);
    if (!chs.length) continue;
    html += '<div class="part-section">';
    html += '<div class="part-label">' + t('parts.' + p) + '</div>';
    html += '<div class="chapter-grid">';
    for (const ch of chs) {
      const d = ch[currentLang];
      const hasDraft = !CONTENT[ch.id] ? ' draft' : '';
      const onclick = CONTENT[ch.id] ? ' onclick="showChapter(\'' + ch.id + '\')"' : '';
      html += '<button class="chapter-card' + hasDraft + '"' + onclick + ' type="button">';
      html += '<div class="num">' + ch.num + '</div>';
      html += '<div class="title">' + d.title + '</div>';
      html += '<div class="desc">' + d.desc + '</div>';
      html += '</button>';
    }
    html += '</div></div>';
  }
  grid.innerHTML = html;
}

function showLanding() {
  currentChapter = null;
  document.getElementById('landing').style.display = '';
  document.getElementById('articleView').classList.remove('visible');
  buildNav();
  window.scrollTo(0, 0);
  history.replaceState(null, '', window.location.pathname);
}

function showChapter(id) {
  const ch = CHAPTERS.find(c => c.id === id);
  if (!ch) return;
  currentChapter = id;
  const d = ch[currentLang];

  document.getElementById('landing').style.display = 'none';
  const article = document.getElementById('articleView');
  article.classList.add('visible');

  document.getElementById('articlePart').textContent = t('parts.' + ch.part);
  document.getElementById('articleTitle').textContent = ch.num + '. ' + d.title;
  document.getElementById('articleDeck').textContent = d.deck || '';

  // Render content
  const content = CONTENT[id]?.[currentLang];
  const body = document.getElementById('articleBody');
  if (content) {
    const html = marked.parse(content);
    body.innerHTML = html;
    // Apply first-para class for drop cap
    const firstP = body.querySelector('p');
    if (firstP) firstP.classList.add('first-para');
    // Process callouts and pullquotes (already in HTML)
    // Highlight code
    body.querySelectorAll('pre code').forEach(block => {
      hljs.highlightElement(block);
    });
  } else {
    body.innerHTML = '<div class="callout info"><div class="callout-title">' +
      (currentLang === 'zh' ? '章节撰写中' : 'Chapter in Progress') +
      '</div>' +
      (currentLang === 'zh'
        ? '本章内容正在撰写中，请稍后查看。所有章节将基于 Claude Code 中的真实测试编写。'
        : 'This chapter is being written. All chapters will be based on real tests in Claude Code.') +
      '</div>';
  }

  // Update nav
  buildNav();
  updateChapterNav();

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo(0, 0);
  history.replaceState(null, '', '#' + id);
}

function updateChapterNav() {
  const idx = CHAPTERS.findIndex(c => c.id === currentChapter);
  const prev = document.getElementById('prevChapter');
  const next = document.getElementById('nextChapter');

  if (idx > 0) {
    prev.style.display = '';
    prev.querySelector('span:last-child').textContent =
      CHAPTERS[idx-1][currentLang].title;
  } else {
    prev.style.display = 'none';
  }

  if (idx < CHAPTERS.length - 1) {
    next.style.display = '';
    next.querySelector('span:first-child').textContent =
      CHAPTERS[idx+1][currentLang].title;
  } else {
    next.style.display = 'none';
  }
}

function navChapter(delta) {
  const idx = CHAPTERS.findIndex(c => c.id === currentChapter);
  const newIdx = idx + delta;
  if (newIdx >= 0 && newIdx < CHAPTERS.length) {
    showChapter(CHAPTERS[newIdx].id);
  }
  return false;
}

// ═══ Init ═══
(function init() {
  // Restore preferences
  const savedLang = localStorage.getItem('wc-lang');
  if (savedLang) currentLang = savedLang;

  const savedTheme = localStorage.getItem('wc-theme');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  // Configure marked
  marked.setOptions({
    breaks: false,
    gfm: true,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });

  applyI18n();
  buildNav();
  buildChapterGrid();

  // Handle hash navigation
  const hash = window.location.hash.slice(1);
  if (hash) {
    const ch = CHAPTERS.find(c => c.id === hash);
    if (ch) showChapter(hash);
  }

  window.addEventListener('hashchange', () => {
    const h = window.location.hash.slice(1);
    if (h) showChapter(h);
    else showLanding();
  });
})();
</script>
